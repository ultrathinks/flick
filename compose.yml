services:
  postgres:
    image: postgres:17-alpine
    container_name: flick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flick
      POSTGRES_PASSWORD: flick
      POSTGRES_DB: flick
    ports:
      - "5432:5432"
    volumes:
      - flick-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flick -d flick"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flick-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - flick-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: flick-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: flick
      MINIO_ROOT_PASSWORD: flickflick
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - flick-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 flick flickflick &&
      mc mb --ignore-existing local/flick-uploads &&
      mc anonymous set download local/flick-uploads
      "

volumes:
  flick-postgres-data:
  flick-redis-data:
  flick-minio-data:
