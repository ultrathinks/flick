services:
  postgres:
    image: postgres:17-alpine
    container_name: flick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flick
      POSTGRES_PASSWORD: flick
      POSTGRES_DB: flick
    ports:
      - "5433:5432"
    volumes:
      - flick-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flick -d flick"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flick-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - flick-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flick-postgres-data:
  flick-redis-data:
