name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flick_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/flick_test
      REDIS_URL: redis://localhost:6379
      BASE_API_URL: http://localhost:3000
      BASE_URL: http://localhost:3002
      DAUTH_AUTHORIZE_URL: http://localhost:3020/oauth/authorize
      DAUTH_CLIENT_ID: ci
      DAUTH_REDIRECT_URI: http://localhost:3002/api/auth/callback

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Apply migrations
        run: pnpm --filter api db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
